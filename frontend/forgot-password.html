<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart — Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/theme.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <!-- Logo -->
        <div class="auth-logo">
            <h1>Split<span>Smart</span></h1>
            <p>Reset your password</p>
        </div>

        <!-- Back button -->
        <a href="index.html" style="display:flex; align-items:center; gap:8px;
            color:var(--text-gray); font-size:14px; margin-bottom:25px;">
            <i class="fas fa-arrow-left"></i> Back to Login
        </a>

        <!-- Info text -->
        <div style="background:rgba(142,68,173,0.05); border:1px solid var(--border);
            border-radius:10px; padding:15px; margin-bottom:25px;">
            <p style="font-size:14px; color:var(--text-gray); line-height:1.6;">
                <i class="fas fa-info-circle" style="color:var(--primary);"></i>
                Enter your email address and we will send you a link to reset your password!
            </p>
        </div>

        <!-- Form -->
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="forgotEmail" placeholder="Enter your email address">
        </div>

        <p class="error-message" id="forgotError"></p>
        <p class="success-message" id="forgotSuccess"></p>

        <button class="btn-primary" onclick="forgotPassword()">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>

    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    const API_URL = 'http://127.0.0.1:8000/api';

    async function forgotPassword() {
        const email = document.getElementById('forgotEmail').value;
        const errorEl = document.getElementById('forgotError');
        const successEl = document.getElementById('forgotSuccess');

        if (!email) {
            errorEl.textContent = 'Please enter your email address!';
            errorEl.style.display = 'block';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/users/forgot-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await response.json();

            if (response.ok) {
                successEl.textContent = data.message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
                document.getElementById('forgotEmail').value = '';
            } else {
                errorEl.textContent = data.error || 'Something went wrong!';
                errorEl.style.display = 'block';
            }
        } catch (error) {
            errorEl.textContent = 'Server error! Please try again.';
            errorEl.style.display = 'block';
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart — Groups</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Page Loader -->
    <div class="page-loader" id="pageLoader">
        <i class="fas fa-spinner"></i>
        <h2>Split<span style="color:#F39C12">Smart</span></h2>
        <p>Loading your groups...</p>
    </div>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>Split<span>Smart</span></h1>
                <p>Split bills smartly</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">
                        <i class="fas fa-home"></i> Dashboard
                    </a></li>
                <li><a href="groups.html" class="active">
                        <i class="fas fa-users"></i> Groups
                    </a></li>
                <li><a href="expenses.html">
                        <i class="fas fa-receipt"></i> Expenses
                    </a></li>
                <li><a href="analytics.html">
                        <i class="fas fa-chart-bar"></i> Analytics
                    </a></li>
            </ul>
            <div class="sidebar-bottom">
                <div class="user-profile" onclick="toggleDropdown()">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-info">
                        <h4 id="userName">User</h4>
                        <p id="userEmail">email@example.com</p>
                    </div>
                    <i class="fas fa-chevron-up" id="dropdownArrow"
                        style="color:rgba(255,255,255,0.6); font-size:12px;"></i>
                </div>

                <!-- Dropdown Menu -->
                <div id="profileDropdown" style="display:none; background:rgba(255,255,255,0.1);
        border-radius:10px; margin-top:8px; overflow:hidden;">
                    <a href="profile.html" style="display:flex; align-items:center; gap:10px;
            padding:12px 15px; color:rgba(255,255,255,0.8); font-size:13px;
            transition:all 0.3s ease; text-decoration:none;"
                        onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                        onmouseout="this.style.background='transparent'">
                        <i class="fas fa-user"></i> Your Profile
                    </a>
                    <a href="settings.html"style="display:flex; align-items:center; gap:10px;
            padding:12px 15px; color:rgba(255,255,255,0.8); font-size:13px;
            transition:all 0.3s ease; text-decoration:none;"
                        onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                        onmouseout="this.style.background='transparent'">
                        <i class="fas fa-cog"></i> Settings
                    </a>
                    <div style="height:1px; background:rgba(255,255,255,0.1); margin:5px 0;"></div>
                    <a onclick="logout()" style="display:flex; align-items:center; gap:10px;
            padding:12px 15px; color:rgba(255, 100, 100, 0.9); font-size:13px;
            transition:all 0.3s ease; cursor:pointer;" onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                        onmouseout="this.style.background='transparent'">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Bar -->
            <div class="topbar">
                <div>
                    <h2>Groups</h2>
                    <p>Manage your expense groups</p>
                </div>
                <div class="topbar-actions">
                    <button class="btn-add" onclick="openCreateGroupModal()">
                        <i class="fas fa-plus"></i> Create Group
                    </button>
                </div>
            </div>

            <!-- Groups Grid -->
            <div id="groupsGrid" style="display:grid; grid-template-columns: repeat(3,1fr); gap:20px;">
                <div class="empty-state" style="grid-column: 1/-1;">
                    <i class="fas fa-users"></i>
                    <p>No groups yet! Create your first group.</p>
                </div>
            </div>

        </main>
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="createGroupModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-users"></i> Create Group</h3>
                <div class="modal-close" onclick="closeCreateGroupModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Group Name</label>
                <input type="text" id="groupName" placeholder="e.g. Goa Trip 2024">
            </div>
            <div class="form-group">
                <label>Description (Optional)</label>
                <input type="text" id="groupDescription" placeholder="e.g. Trip expenses">
            </div>
            <div class="form-group">
                <label>Group Type</label>
                <select id="groupType">
                    <option value="trip">Trip</option>
                    <option value="home">Home</option>
                    <option value="office">Office</option>
                    <option value="friends">Friends</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <p class="error-message" id="groupError"></p>
            <button class="btn-primary" onclick="createGroup()">
                <i class="fas fa-plus"></i> Create Group
            </button>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-user-plus"></i> Add Member</h3>
                <div class="modal-close" onclick="closeAddMemberModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Member Email</label>
                <input type="email" id="memberEmail" placeholder="Enter member's email">
            </div>
            <p class="error-message" id="memberError"></p>
            <p class="success-message" id="memberSuccess"></p>
            <button class="btn-primary" onclick="addMember()">
                <i class="fas fa-user-plus"></i> Add Member
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/groups.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart — Reset Password</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/theme.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="auth-box">

        <!-- Logo -->
        <div class="auth-logo">
            <h1>Split<span>Smart</span></h1>
            <p>Set your new password</p>
        </div>

        <!-- Form -->
        <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
        </div>
        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
        </div>

        <p class="error-message" id="resetError"></p>
        <p class="success-message" id="resetSuccess"></p>

        <button class="btn-primary" onclick="resetPassword()">
            <i class="fas fa-lock"></i> Reset Password
        </button>

    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    const API_URL = 'http://127.0.0.1:8000/api';

    // Get uid and token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const token = urlParams.get('token');

    if (!uid || !token) {
        window.location.href = 'index.html';
    }

    async function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorEl = document.getElementById('resetError');
        const successEl = document.getElementById('resetSuccess');

        if (!newPassword || !confirmPassword) {
            errorEl.textContent = 'Please fill in all fields!';
            errorEl.style.display = 'block';
            return;
        }

        if (newPassword !== confirmPassword) {
            errorEl.textContent = 'Passwords do not match!';
            errorEl.style.display = 'block';
            return;
        }

        if (newPassword.length < 8) {
            errorEl.textContent = 'Password must be at least 8 characters!';
            errorEl.style.display = 'block';
            return;
        }

        try {
            const response = await fetch(`${API_URL}/users/reset-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid, token, new_password: newPassword })
            });

            const data = await response.json();

            if (response.ok) {
                successEl.textContent = data.message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } else {
                errorEl.textContent = data.error || 'Something went wrong!';
                errorEl.style.display = 'block';
            }
        } catch (error) {
            errorEl.textContent = 'Server error! Please try again.';
            errorEl.style.display = 'block';
        }
    }
</script>

</body>
</html>

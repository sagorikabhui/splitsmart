<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitSmart — Split bills smartly</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-box">

            <!-- Logo -->
            <div class="auth-logo">
                <h1>Split<span>Smart</span></h1>
                <p>Split bills smartly, settle up instantly</p>
            </div>

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" id="registerTab" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <div style="text-align:right; margin-bottom:10px;">
                    <a href="forgot-password.html" style="font-size:13px; color:var(--primary); font-weight:600;">
                        <i class="fas fa-lock"></i> Forgot Password?
                    </a>
                </div>
                <p class="error-message" id="loginError"></p>
                <button class="btn-primary" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" style="display:none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" placeholder="Last name">
                    </div>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="registerEmail" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="registerPassword" placeholder="Create a password">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone (Optional)</label>
                        <input type="text" id="phone" placeholder="Phone number">
                    </div>
                    <div class="form-group">
                        <label>UPI ID (Optional)</label>
                        <input type="text" id="upiId" placeholder="yourname@upi">
                    </div>
                </div>
                <p class="error-message" id="registerError"></p>
                <p class="success-message" id="registerSuccess"></p>
                <button class="btn-primary" onclick="register()">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </div>

        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script src="js/auth.js"></script>
</body>

</html>
